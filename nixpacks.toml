[phases.setup]
nixPkgs = [
  "php84",
  "php84Extensions.pdo",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.sqlite3",
  "php84Extensions.mbstring",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.ctype",
  "php84Extensions.fileinfo",
  "php84Extensions.curl"
]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && /usr/local/bin/composer install --ignore-platform-reqs"
]

[phases.build]
cmds = [
  "/usr/local/bin/composer install --no-dev --optimize-autoloader",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"